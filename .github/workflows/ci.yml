name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: bot
          POSTGRES_DB: foodbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Real DB from the service container.
      DATABASE_URL: postgres://bot:bot@localhost:5432/foodbot
      # config.ts requires these at import time — dummy values are fine for tests.
      TELEGRAM_BOT_TOKEN: dummy-telegram-token
      OPENROUTER_API_KEY: dummy-openrouter-key
      TZ: Europe/Moscow

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx drizzle-kit migrate

      - name: Run unit tests (no DB required)
        run: npm test

      - name: Run DB integration tests
        run: npm run test:db

      # TODO: add `npm run check` (tsc) once the 14 known pre-existing
      # type errors in server/bot.ts (downlevelIteration / implicit-any)
      # are fixed. Skipped for now to keep CI green.
